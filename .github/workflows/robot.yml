name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # ตัด libgconf-2-4 ออกเพื่อให้รันบน Ubuntu 24.04 ได้
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python Dependencies
        run: |
          pip install robotframework robotframework-seleniumlibrary selenium webdriver-manager

      - name: Run Robot Tests
        run: |
          # ใช้ xvfb-run เพื่อจำลองหน้าจอ และรัน Robot Framework
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          robot -d results tests/CreateNewCustomer_Ind_test.robot

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-report
          path: results/